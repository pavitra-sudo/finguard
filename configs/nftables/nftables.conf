#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        ct state { established, related } accept
        iifname "lo" accept
        ct state invalid drop
        ip protocol icmp icmp type { echo-request, echo-reply } accept
        ip6 nexthdr icmpv6 icmpv6 type { echo-request, echo-reply } accept
        tcp dport 22 ct state new limit rate 5/minute accept
        udp dport 51820 accept
        iifname "wg0" ip saddr 10.10.0.0/24 udp dport 53 accept
        iifname "wg0" ip saddr 10.10.0.0/24 tcp dport 53 accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
        ct state { established, related } accept
        iifname "wg0" oifname "eth0" accept
        iifname "wg0" oifname "eth0" ip daddr 192.168.1.0/24 accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority 0; policy accept;
    }

    chain postrouting {
        type nat hook postrouting priority 100; policy accept;
        ip saddr 10.10.0.0/24 oifname "eth0" masquerade
    }
}
